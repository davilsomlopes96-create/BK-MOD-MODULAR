<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK PROJECT - ACESSO RESTRITO</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding: 20px; text-transform: uppercase; }
        .painel { border: 4px solid #00ff00; border-radius: 20px; padding: 20px; box-shadow: 0 0 30px #00ff00; background: rgba(0,255,0,0.05); max-width: 400px; margin: auto; }
        input { background: #111; border: 1px solid #00ff00; color: #00ff00; padding: 15px; width: 80%; border-radius: 10px; text-align: center; font-size: 18px; margin-bottom: 15px; }
        .btn-injecao { background: #00ff00; color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: 900; width: 100%; margin-bottom: 10px; cursor: pointer; font-size: 15px; box-shadow: 0 4px 0 #008800; }
        .btn-final { background: #fff; color: #000; padding: 20px; border: none; border-radius: 12px; font-weight: 900; width: 100%; display: none; cursor: pointer; font-size: 18px; margin-top: 10px; }
        .status-box { border: 1px solid #555; padding: 10px; margin: 15px 0; font-size: 12px; color: #fff; }
        #conteudo-hack { display: none; }
    </style>
</head>
<body>
    <div class="painel">
        <h1>BK PROJECT v1.123.1</h1>
        
        <!-- Tela de Login -->
        <div id="login-screen">
            <p>DIGITE A SENHA PARA ACESSAR:</p>
            <input type="password" id="senhaInput" placeholder="SENHA AQUI">
            <button class="btn-injecao" onclick="verificarSenha()">ENTRAR NO SISTEMA</button>
        </div>

        <!-- Conteúdo do Painel (Escondido até logar) -->
        <div id="conteudo-hack">
            <div class="status-box">
                OFFSETS: 0x5F80920 | 0x672F4FC<br>
                STATUS: <span id="stat" style="color:#00ff00;">LOGADO</span>
            </div>

            <button id="bt1" class="btn-injecao" onclick="fase1()">1. ATIVAR TRAVA 100% HS</button>
            <button id="bt2" class="btn-injecao" style="display:none; background:#ff0000; color:#fff;" onclick="fase2()">2. REMOVER TREMEDEIRA</button>
            <button id="bt3" class="btn-injecao" style="display:none; background:#0055ff; color:#fff;" onclick="fase3()">3. AJUSTAR PRECISÃO</button>
            <button id="bt4" class="btn-injecao" style="display:none; background:#ffaa00; color:#000;" onclick="fase4()">4. DESBLOQUEAR 120 FPS</button>
            
            <button id="btGame" class="btn-final" onclick="abrirJogo()">ENTRAR NO FREE FIRE</button>
        </div>
    </div>

    <script>
        function verificarSenha() {
            let senha = document.getElementById('senhaInput').value;
            if (senha === "dadeios") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('conteudo-hack').style.display = "block";
            } else {
                alert("SENHA INCORRETA!");
            }
        }

        function fase1() {
            document.getElementById('stat').innerHTML = "TRAVANDO...";
            setTimeout(() => {
                document.getElementById('bt1').style.display = "none";
                document.getElementById('bt2').style.display = "block";
                document.getElementById('stat').innerHTML = "AIMBOT OK";
            }, 1000);
        }

        function fase2() {
            document.getElementById('stat').innerHTML = "ESTABILIZANDO...";
            setTimeout(() => {
                document.getElementById('bt2').style.display = "none";
                document.getElementById('bt3').style.display = "block";
                document.getElementById('stat').innerHTML = "NO SHAKE OK";
            }, 1000);
        }

        function fase3() {
            document.getElementById('stat').innerHTML = "PRECISÃO...";
            setTimeout(() => {
                document.getElementById('bt3').style.display = "none";
                document.getElementById('bt4').style.display = "block";
                document.getElementById('stat').innerHTML = "PRECISÃO OK";
            }, 1000);
        }

        function fase4() {
            setTimeout(() => {
                document.getElementById('bt4').style.display = "none";
                document.getElementById('btGame').style.display = "block";
                document.getElementById('stat').innerHTML = "BK FULL ATIVO ✅";
                alert("SISTEMA BK LIBERADO COM SUCESSO!");
            }, 1000);
        }

        function abrirJogo() {
            window.location.replace("freefire://");
            setTimeout(() => { window.location.replace("com.dts.freefireth://"); }, 1000);
        }
    </script>
</body>
</html>
