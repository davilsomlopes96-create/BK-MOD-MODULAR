<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK PROJECT - AIMLOCK 100% HS</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .painel { border: 4px solid #ff0000; border-radius: 20px; padding: 20px; box-shadow: 0 0 50px #ff0000; max-width: 400px; margin: auto; background: rgba(20, 0, 0, 0.9); }
        .btn-injecao { background: #ff0000; color: #fff; padding: 15px; border: none; border-radius: 12px; font-weight: 900; width: 100%; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; }
        .btn-final { background: #fff; color: #000; padding: 20px; border: none; border-radius: 12px; font-weight: 900; width: 100%; display: none; cursor: pointer; margin-top: 10px; font-size: 18px; }
        .status-box { border: 2px solid #ff0000; padding: 15px; margin: 15px 0; font-size: 14px; color: #fff; background: #111; text-align: left; }
        #conteudo-hack { display: none; }
        input { background: #111; border: 2px solid #ff0000; color: #00ff00; padding: 15px; width: 85%; border-radius: 10px; text-align: center; margin-bottom: 15px; font-size: 18px; }
        .blink { animation: blinker 1s linear infinite; color: #00ff00; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="painel">
        <h1 style="color:#fff; text-shadow: 0 0 10px #ff0000;">BK AIMLOCK v4.0</h1>
        
        <div id="login-screen">
            <p style="color: #fff;">SISTEMA BLOQUEADO</p>
            <input type="password" id="senhaInput" placeholder="DIGITE A SENHA">
            <button class="btn-injecao" onclick="verificarSenha()">DESBLOQUEAR BK-M</button>
        </div>

        <div id="conteudo-hack">
            <div class="status-box">
                <b>[SISTEMA]</b>: <span id="stat" class="blink">AGUARDANDO...</span><br>
                <b>[CONFIG]</b>: AIMBOT & AIMLOCK ATIVOS<br>
                <b>[MODO]</b>: ZERO PEITO / SÓ CAPA
            </div>

            <button id="bt1" class="btn-injecao" onclick="fase1()">1. ATIVAR AIMBOT BRUTAL</button>
            <button id="bt2" class="btn-injecao" style="display:none; background:#00ff00; color:#000;" onclick="fase2()">2. FIXAR AIMLOCK HEAD (TRAVA)</button>
            <button id="bt3" class="btn-injecao" style="display:none; background:#0055ff; color:#fff;" onclick="fase3()">3. BYPASS HITBOX PEITO</button>
            
            <button id="btGame" class="btn-final" onclick="abrirJogo()">🔥 INICIAR FREE FIRE 🔥</button>
        </div>
    </div>

    <script>
        function verificarSenha() {
            if (document.getElementById('senhaInput').value === "dadeios") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('conteudo-hack').style.display = "block";
            } else { alert("ACESSO NEGADO!"); }
        }

        function fase1() {
            document.getElementById('stat').innerHTML = "INJETANDO AIMBOT...";
            setTimeout(() => {
                document.getElementById('bt1').style.display = "none";
                document.getElementById('bt2').style.display = "block";
                document.getElementById('stat').innerHTML = "AIMBOT ATIVO ✅";
            }, 250);
        }

        function fase2() {
            document.getElementById('stat').innerHTML = "TRAVANDO MIRA NA CABEÇA...";
            setTimeout(() => {
                document.getElementById('bt2').style.display = "none";
                document.getElementById('bt3').style.display = "block";
                document.getElementById('stat').innerHTML = "AIMLOCK FIXADO ✅";
            }, 250);
        }

        function fase3() {
            document.getElementById('stat').innerHTML = "REMOVENDO DANO NO CORPO...";
            setTimeout(() => {
                document.getElementById('bt3').style.display = "none";
                document.getElementById('btGame').style.display = "block";
                document.getElementById('stat').innerHTML = "ZERO PEITO PRONTO ✅";
            }, 250);
        }

        function abrirJogo() {
            window.location.replace("freefire://");
            setTimeout(() => { window.location.replace("com.dts.freefireth://"); }, 1000);
        }
    </script>
</body>
</html>
