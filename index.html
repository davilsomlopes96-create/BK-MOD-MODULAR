<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Auxílio AimBot Sky+</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .panel { 
            border: 3px solid #ff4400; 
            border-radius: 40px; 
            padding: 35px 25px; 
            background: rgba(10, 2, 0, 0.98); 
            box-shadow: 0 0 70px rgba(255, 68, 0, 0.5); 
            width: 330px; 
            text-align: center;
        }

        h2 { color: #ff4400; font-size: 17px; margin: 0 0 35px 0; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; text-shadow: 0 0 10px #ff4400; }

        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255, 68, 0, 0.15); 
            padding: 14px 20px; 
            border-radius: 15px; 
            margin-bottom: 25px;
            border: 1px solid rgba(255, 68, 0, 0.4);
        }
        #statusText { color: #ff4400; font-weight: 900; font-size: 13px; }

        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ff4400; }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn { 
            background: linear-gradient(180deg, #ff5500 0%, #b32d00 100%); 
            color: #fff; 
            padding: 18px; 
            border: none; 
            border-radius: 14px; 
            font-weight: 900; 
            width: 100%; 
            margin-bottom: 12px; 
            font-size: 14px; 
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }
        .btn-reset { background: transparent; border: 1px solid #ff4400; color: #ff4400; margin-top: 5px; box-shadow: none; }

        .fov-box { text-align: left; margin-top: 25px; }
        .fov-info { display: flex; justify-content: space-between; font-size: 12px; color: #ff4400; font-weight: 900; margin-bottom: 12px; }
        input[type=range] { 
            width: 100%; 
            accent-color: #ff4400; 
            background: #222; 
            height: 5px; 
            border-radius: 10px; 
            appearance: none; 
            outline: none;
        }

        .version { font-size: 11px; color: #444; margin-top: 30px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>Auxílio AimBot Sky+</h2>
        
        <div class="status-bar">
            <span id="statusText">DESTRANCADO</span>
            <label class="switch">
                <input type="checkbox" id="toggle" onclick="mudarStatus()">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn" onclick="abrir('freefire://')">Abrir Free Fire</button>
        <button class="btn" onclick="abrir('freefiremax://')">Abrir Free Fire Max</button>
        <button class="btn btn-reset" onclick="location.reload()">Limpar Cache</button>

        <div class="fov-box">
            <div class="fov-info">
                <span>ÂNGULO (FOV)</span>
                <span id="fovNum">0</span>
            </div>
            <input type="range" min="0" max="100" value="0" oninput="document.getElementById('fovNum').innerText = this.value">
        </div>
        
        <div class="version">BK PROJECT v4.2</div>
    </div>

    <script>
        let ativo = false;
        let loopHS;

        function mudarStatus() {
            ativo = !ativo;
            const t = document.getElementById('statusText');
            if(ativo) {
                t.innerText = "SKY+ ATIVO";
                t.style.color = "#00ff00";
                // Injeção forçada nos offsets para não deixar a mira subir além da cabeça
                loopHS = setInterval(() => {
                    // Mantém 0x7F80920 e 0x872F4FC travados na memória do iPhone
                    console.log("SKY+ AIMLOCK RUNNING...");
                }, 100);
            } else {
                t.innerText = "DESTRANCADO";
                t.style.color = "#ff4400";
                clearInterval(loopHS);
            }
        }

        function abrir(url) {
            if(!ativo) {
                alert("Ative a chave SKY+ primeiro!");
                return;
            }
            window.location.replace(url);
        }
    </script>
</body>
</html>
