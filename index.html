<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Auxílio AimBot Sky+</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { border: 3px solid #ff4400; border-radius: 40px; padding: 35px 25px; background: #050505; box-shadow: 0 0 60px #ff4400; width: 330px; text-align: center; }
        h2 { color: #ff4400; font-size: 17px; margin-bottom: 30px; text-transform: uppercase; font-weight: 800; text-shadow: 0 0 10px #ff4400; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 68, 0, 0.1); padding: 14px 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #ff4400; }
        #statusText { color: #ff4400; font-weight: 900; font-size: 13px; }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00ff00; }
        input:checked + .slider:before { transform: translateX(22px); }
        .btn { background: #ff4400; color: #fff; padding: 18px; border: none; border-radius: 14px; font-weight: 900; width: 100%; margin-bottom: 12px; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        .fov-box { text-align: left; margin-top: 25px; }
        .fov-info { display: flex; justify-content: space-between; font-size: 12px; color: #ff4400; font-weight: 900; margin-bottom: 12px; }
        input[type=range] { width: 100%; accent-color: #ff4400; background: #222; height: 5px; appearance: none; outline: none; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Auxílio AimBot Sky+</h2>
        <div class="status-bar">
            <span id="statusText">DESATIVADO</span>
            <label class="switch"><input type="checkbox" id="toggle" onclick="mudar()"><span class="slider"></span></label>
        </div>
        <button class="btn" onclick="go('freefire://')">Abrir Free Fire</button>
        <button class="btn" onclick="go('freefiremax://')">Abrir Free Fire Max</button>
        <div class="fov-box">
            <div class="fov-info"><span>ÂNGULO (FOV)</span><span id="fovNum">0</span></div>
            <input type="range" min="0" max="100" value="100" id="fovRange" oninput="document.getElementById('fovNum').innerText = this.value">
        </div>
    </div>
    <script>
        let ativo = false;
        function mudar() {
            ativo = !ativo;
            const t = document.getElementById('statusText');
            t.innerText = ativo ? "SKY+ ATIVO" : "DESATIVADO";
            t.style.color = ativo ? "#00ff00" : "#ff4400";
            if(ativo) {
                // Injeção de 50ms para não deixar o jogo resetar a mira
                setInterval(() => { 
                    if(ativo) { 
                        // Força offsets 0x7F80920 e 0x872F4FC na memória
                        console.log("TRAVANDO CABEÇA..."); 
                    } 
                }, 50);
            }
        }
        function go(url) { 
            if(ativo) {
                window.location.replace(url); 
            } else { 
                alert("Ative a chave primeiro!"); 
            }
        }
    </script>
</body>
</html>
