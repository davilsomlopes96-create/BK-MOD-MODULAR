<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK PROJECT - 100% HS</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .painel { border: 4px solid #ff0000; border-radius: 20px; padding: 20px; box-shadow: 0 0 40px #ff0000; max-width: 400px; margin: auto; }
        .btn-injecao { background: #ff0000; color: #fff; padding: 15px; border: none; border-radius: 12px; font-weight: 900; width: 100%; margin-bottom: 10px; cursor: pointer; }
        .btn-final { background: #fff; color: #000; padding: 20px; border: none; border-radius: 12px; font-weight: 900; width: 100%; display: none; cursor: pointer; margin-top: 10px; }
        .status-box { border: 1px solid #ff0000; padding: 10px; margin: 15px 0; font-size: 13px; color: #fff; background: rgba(255,0,0,0.1); }
        #conteudo-hack { display: none; }
        input { background: #111; border: 1px solid #ff0000; color: #00ff00; padding: 15px; width: 80%; border-radius: 10px; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="painel">
        <h1 style="color:#ff0000;">BK FULL CAPA v3.0</h1>
        
        <div id="login-screen">
            <p>SENHA DE ACESSO:</p>
            <input type="password" id="senhaInput" placeholder="DIGITE AQUI">
            <button class="btn-injecao" onclick="verificarSenha()">ENTRAR NO SISTEMA</button>
        </div>

        <div id="conteudo-hack">
            <div class="status-box">
                MIRA: <span id="stat" style="color:#ff0000;">AGUARDANDO INJEÇÃO</span><br>
                REGEDIT: ZERO PEITO ATIVADO
            </div>

            <button id="bt1" class="btn-injecao" onclick="fase1()">1. FIXAR MIRA NO PESCOÇO (FORÇAR CAPA)</button>
            <button id="bt2" class="btn-injecao" style="display:none; background:#00ff00; color:#000;" onclick="fase2()">2. REMOVER SENSIBILIDADE DO PEITO</button>
            <button id="bt3" class="btn-injecao" style="display:none; background:#0055ff; color:#fff;" onclick="fase3()">3. ATIVAR LOCK-ON HEAD (BRUTAL)</button>
            
            <button id="btGame" class="btn-final" onclick="abrirJogo()">INICIAR FREE FIRE (SÓ CAPA)</button>
        </div>
    </div>

    <script>
        function verificarSenha() {
            if (document.getElementById('senhaInput').value === "dadeios") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('conteudo-hack').style.display = "block";
            } else { alert("SENHA INCORRETA!"); }
        }

        function fase1() {
            document.getElementById('stat').innerHTML = "TRAVANDO NO PESCOÇO...";
            setTimeout(() => {
                document.getElementById('bt1').style.display = "none";
                document.getElementById('bt2').style.display = "block";
                document.getElementById('stat').innerHTML = "TRAVA 1 OK ✅";
            }, 300); // Super rápido
        }

        function fase2() {
            document.getElementById('stat').innerHTML = "REMOVENDO HITBOX PEITO...";
            setTimeout(() => {
                document.getElementById('bt2').style.display = "none";
                document.getElementById('bt3').style.display = "block";
                document.getElementById('stat').innerHTML = "PEITO REMOVIDO ✅";
            }, 300);
        }

        function fase3() {
            document.getElementById('stat').innerHTML = "FINALIZANDO INJEÇÃO CAPA...";
            setTimeout(() => {
                document.getElementById('bt3').style.display = "none";
                document.getElementById('btGame').style.display = "block";
                document.getElementById('stat').innerHTML = "SÓ CAPA ATIVO ✅";
                alert("MODO ZERO PEITO PRONTO!");
            }, 300);
        }

        function abrirJogo() {
            window.location.replace("freefire://");
            setTimeout(() => { window.location.replace("com.dts.freefireth://"); }, 1000);
        }
    </script>
</body>
</html>
