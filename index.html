<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>BK PROJECT - FULL CAPA</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .painel { border: 5px solid #ff0000; border-radius: 25px; padding: 20px; box-shadow: 0 0 60px #ff0000; background: #050505; max-width: 400px; margin: auto; }
        .btn-injecao { background: #ff0000; color: #fff; padding: 18px; border: none; border-radius: 15px; font-weight: 900; width: 100%; margin-bottom: 12px; cursor: pointer; font-size: 15px; }
        .btn-final { background: #fff; color: #000; padding: 22px; border: none; border-radius: 15px; font-weight: 900; width: 100%; display: none; cursor: pointer; font-size: 22px; box-shadow: 0 0 30px #fff; }
        .status-box { background: #111; border: 1px solid #ff0000; padding: 15px; margin-bottom: 20px; text-align: left; font-size: 13px; color: #00ff00; }
        #conteudo-hack { display: none; }
        input { background: #111; border: 2px solid #ff0000; color: #00ff00; padding: 15px; width: 85%; border-radius: 12px; text-align: center; margin-bottom: 15px; font-size: 20px; }
    </style>
</head>
<body>
    <div class="painel">
        <h1 style="color:#ff0000; text-shadow: 0 0 15px #ff0000;">BK AIMLOCK v10.0</h1>
        
        <div id="login-screen">
            <input type="password" id="senhaInput" placeholder="DIGITE A SENHA">
            <button class="btn-injecao" onclick="verificarSenha()">DESBLOQUEAR OFFSETS</button>
        </div>

        <div id="conteudo-hack">
            <div class="status-box">
                > MEMORY 1: 0x7F80920 (HEAD)<br>
                > MEMORY 2: 0x872F4FC (LOCK)<br>
                > HITBOX: ZERO CORPO / 100% HS
            </div>

            <button id="bt1" class="btn-injecao" onclick="injetar()">[1] INJETAR AIMBOT BRUTAL</button>
            <button id="bt2" class="btn-injecao" style="display:none; background:#00ff00; color:#000;" onclick="travar()">[2] FIXAR AIMLOCK (ZERO PINAR)</button>
            
            <button id="btGame" class="btn-final" onclick="abrirJogo()">🔥 ENTRAR NO JOGO 🔥</button>
        </div>
    </div>

    <script>
        function verificarSenha() {
            if (document.getElementById('senhaInput').value === "dadeios") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('conteudo-hack').style.display = "block";
            } else { alert("ACESSO NEGADO!"); }
        }

        function injetar() {
            document.getElementById('bt1').innerHTML = "INJETANDO...";
            setTimeout(() => {
                document.getElementById('bt1').style.display = "none";
                document.getElementById('bt2').style.display = "block";
            }, 200);
        }

        function travar() {
            document.getElementById('bt2').innerHTML = "TRAVANDO CABEÇA...";
            setTimeout(() => {
                document.getElementById('bt2').style.display = "none";
                document.getElementById('btGame').style.display = "block";
            }, 200);
        }

        function abrirJogo() {
            window.location.replace("freefire://");
            setTimeout(() => { window.location.replace("com.dts.freefireth://"); }, 600);
        }
    </script>
</body>
</html>
