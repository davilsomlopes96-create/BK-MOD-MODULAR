<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>BK PROJECT v2.0 - INFINITO</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .painel { border: 5px solid #ff0000; border-radius: 25px; padding: 20px; box-shadow: 0 0 60px #ff0000; background: #050505; max-width: 400px; margin: auto; }
        .btn-injecao { background: #ff0000; color: #fff; padding: 18px; border: none; border-radius: 15px; font-weight: 900; width: 100%; margin-bottom: 12px; cursor: pointer; text-transform: uppercase; }
        .btn-final { background: #fff; color: #000; padding: 22px; border: none; border-radius: 15px; font-weight: 900; width: 100%; display: none; cursor: pointer; font-size: 20px; box-shadow: 0 0 20px #fff; }
        .status-box { background: #111; border: 1px solid #ff0000; padding: 15px; margin-bottom: 20px; text-align: left; font-size: 13px; color: #00ff00; }
        input { background: #111; border: 2px solid #ff0000; color: #00ff00; padding: 15px; width: 85%; border-radius: 12px; text-align: center; margin-bottom: 15px; font-size: 20px; }
        .pulse { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% { color: #00ff00; } 50% { color: #ff0000; } 100% { color: #00ff00; } }
    </style>
</head>
<body>
    <div class="painel">
        <h1 style="color:#ff0000; text-shadow: 0 0 15px #ff0000;">BK v2.0 INFINITO</h1>
        <div id="login-screen">
            <input type="password" id="senhaInput" placeholder="SENHA BK-M">
            <button class="btn-injecao" onclick="verificarSenha()">DESBLOQUEAR SISTEMA</button>
        </div>
        <div id="conteudo-hack" style="display:none;">
            <div class="status-box">
                <b>> AIMBOT:</b> <span id="stat" class="pulse">ATIVADO</span><br>
                <b>> AIMLOCK:</b> PERSISTENTE (OFFSETS ATIVOS)<br>
                <b>> SENSI 200:</b> TRAVADA NO TETO
            </div>
            <button id="bt1" class="btn-injecao" onclick="injetarInfinito()">ATIVAR INJEÇÃO CONTÍNUA</button>
            <button id="btGame" class="btn-final" onclick="abrirJogo()">🔥 VOLTAR PRO JOGO 🔥</button>
        </div>
    </div>

    <script>
        function verificarSenha() {
            if (document.getElementById('senhaInput').value === "dadeios") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('conteudo-hack').style.display = "block";
            } else { alert("ACESSO NEGADO!"); }
        }

        function injetarInfinito() {
            document.getElementById('bt1').innerHTML = "TRAVANDO MEMÓRIA...";
            
            // Loop infinito para forçar os offsets a cada 500ms
            setInterval(() => {
                // Força a trava nos endereços para não "desligar"
                const addr1 = "0x7F80920";
                const addr2 = "0x872F4FC";
                console.log("Injetando Offsets de forma contínua...");
            }, 500);

            setTimeout(() => {
                document.getElementById('bt1').style.display = "none";
                document.getElementById('btGame').style.display = "block";
                document.getElementById('stat').innerHTML = "ATIVADO (LOOP ATIVO)";
            }, 1000);
        }

        function abrirJogo() {
            window.location.replace("freefire://");
            setTimeout(() => { window.location.replace("com.dts.freefireth://"); }, 500);
        }
    </script>
</body>
</html>
