<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

        .btn-injecao { background: #00ffff; color: #000; padding: 20px; border: none; border-radius: 15px; font-weight: 900; width: 100%; margin-bottom: 15px; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        .btn-final { background: #fff; color: #000; padding: 25px; border: none; border-radius: 20px; font-weight: 900; width: 100%; display: none; cursor: pointer; font-size: 22px; box-shadow: 0 0 40px #fff; }
        .status-box { background: #111; border: 1px solid #00ffff; padding: 15px; margin-bottom: 25px; text-align: left; font-size: 12px; color: #00ff00; }
        input { background: #000; border: 2px solid #00ffff; color: #00ffff; padding: 18px; width: 85%; border-radius: 15px; text-align: center; margin-bottom: 20px; font-size: 22px; }
        .sky-text { color: #00ffff; font-weight: bold; text-shadow: 0 0 10px #00ffff; }
    </style>
</head>

            <button id="btGame" class="btn-final" onclick="abrirJogo()">🔥 ENTRAR NO JOGO 🔥</button>

    </div>

            setInterval(() => {

                // Lógica de injeção contínua para evitar que o Aimbot desligue
            }, 150);

            setTimeout(() => {
                document.getElementById('bt1').style.display = "none";

            window.location.replace("freefire://");

</body>
</html>
