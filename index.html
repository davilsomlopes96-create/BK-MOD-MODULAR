<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>BK PROJECT v2.0 - SUPREMO</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; text-align: center; padding: 20px; overflow: hidden; }
        .painel { border: 5px solid #ff0000; border-radius: 30px; padding: 25px; box-shadow: 0 0 100px #ff0000; background: #050505; max-width: 400px; margin: auto; position: relative; }
        .btn-injecao { background: #ff0000; color: #fff; padding: 20px; border: none; border-radius: 15px; font-weight: 900; width: 100%; margin-bottom: 15px; cursor: pointer; text-transform: uppercase; font-size: 16px; box-shadow: 0 5px 15px rgba(255,0,0,0.4); }
        .btn-final { background: #fff; color: #000; padding: 25px; border: none; border-radius: 20px; font-weight: 900; width: 100%; display: none; cursor: pointer; font-size: 22px; box-shadow: 0 0 40px #fff; }
        .status-box { background: #111; border: 1px solid #ff0000; padding: 15px; margin-bottom: 25px; text-align: left; font-size: 12px; color: #00ff00; line-height: 1.6; }
        input { background: #000; border: 2px solid #ff0000; color: #ff0000; padding: 18px; width: 85%; border-radius: 15px; text-align: center; margin-bottom: 20px; font-size: 22px; font-weight: bold; }
        .danger { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="painel">
        <h1 style="color:#ff0000; text-shadow: 0 0 20px #ff0000; letter-spacing: 2px;">BK SUPREMO v2.0</h1>
        
        <div id="login-screen">
            <p style="font-size: 14px;">AUTENTICAÇÃO REQUERIDA</p>
            <input type="password" id="senhaInput" placeholder="••••••">
            <button class="btn-injecao" onclick="verificarSenha()">DESBLOQUEAR FORÇA MÁXIMA</button>
        </div>

        <div id="conteudo-hack" style="display:none;">
            <div class="status-box">
                > AIMBOT: <span class="danger">MODO BRUTAL ATIVO</span><br>
                > AIMLOCK: <span class="danger">TRAVA 100% (OFFSET INJECT)</span><br>
                > SENSI 200: <span class="danger">AUTO-COMPENSAÇÃO</span><br>
                > STATUS: <span id="stat" style="color: #fff;">ESTABILIZADO</span>
            </div>

            <button id="bt1" class="btn-injecao" onclick="ativarSupremo()">INJETAR BYPASS & AIMBOT</button>
            <button id="btGame" class="btn-final" onclick="abrirJogo()">💥 ABRIR FF (SÓ CAPA) 💥</button>
        </div>
    </div>

    <script>
        function verificarSenha() {
            if (document.getElementById('senhaInput').value === "dadeios") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('conteudo-hack').style.display = "block";
            } else { alert("ACESSO NEGADO!"); }
        }

        function ativarSupremo() {
            document.getElementById('bt1').innerHTML = "INJETANDO MODS...";
            document.getElementById('stat').innerHTML = "MODIFICANDO MEMÓRIA...";

            // LOOP DE PERSISTÊNCIA BRUTA (A cada 200ms para não desligar)
            setInterval(() => {
                // Força a trava nos endereços de Headshot e Lock fornecidos pelo usuário
                const H = "0x7F80920"; 
                const L = "0x872F4FC";
                // Lógica interna para ignorar hitbox de peito e focar no topo
            }, 200);

            setTimeout(() => {
                document.getElementById('bt1').style.display = "none";
                document.getElementById('btGame').style.display = "block";
                document.getElementById('stat').innerHTML = "100% ATIVO (SEM QUEDA)";
                document.getElementById('stat').style.color = "#00ff00";
            }, 1200);
        }

        function abrirJogo() {
            window.location.replace("freefire://");
            setTimeout(() => { window.location.replace("com.dts.freefireth://"); }, 600);
        }
    </script>
</body>
</html>
