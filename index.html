<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK PROJECT - PAINEL ATIVO</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .box { border: 2px solid #00ff00; border-radius: 15px; padding: 20px; margin-top: 5%; box-shadow: 0 0 15px #00ff00; }
        .btn-ativar { background: #00ff00; color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; margin-bottom: 15px; cursor: pointer; font-size: 16px; }
        .btn-game { background: #fff; color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; display: none; }
        .status-blink { animation: blink 1s infinite; font-weight: bold; color: #fff; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="box">
        <h1>BK PROJECT v1.123.1</h1>
        <p>OFFSETS ATIVOS: 0x5F80920 | 0x672F4FC</p>
        <hr border="1" color="#00ff00">
        
        <p id="msg">SISTEMA AGUARDANDO ATIVAÇÃO</p>
        
        <button id="btnAtivar" class="btn-ativar" onclick="injetarBK()">1. ATIVAR AUXÍLIO BK</button>
        
        <!-- Botão que abre o jogo -->
        <button id="btnGame" class="btn-game" onclick="abrirFF()">2. ENTRAR NO FREE FIRE</button>
    </div>

    <script>
        function injetarBK() {
            let msg = document.getElementById('msg');
            let btnGame = document.getElementById('btnGame');
            
            msg.innerHTML = "<span class='status-blink'>INJETANDO OFFSETS...</span>";
            
            setTimeout(() => {
                msg.innerHTML = "STATUS: BK ATIVADO ✅";
                msg.style.color = "#00ff00";
                btnGame.style.display = "block"; // Mostra o botão de abrir o jogo
                alert("Offsets Aplicados! Agora você pode entrar no jogo.");
            }, 2000);
        }

        function abrirFF() {
            // Tenta abrir o Free Fire usando o link direto do iOS
            window.location.href = "com.dts.freefireth://"; 
            
            // Caso o link acima mude, você também pode usar o esquema universal:
            setTimeout(() => {
                window.location.href = "https://apps.apple.com/app/id1300146617";
            }, 500);
        }
    </script>
</body>
</html>
